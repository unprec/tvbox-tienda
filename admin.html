<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — TV Box Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --good: #3ecf8e;
    --bad: #f66;
    --text: #f0f0f5;
    --muted: #7a7a90;
    --amber: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    margin-bottom: 0.25rem;
  }
  .login-logo span { color: var(--accent); }
  .login-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }
  .login-label { display: block; font-size: 12px; color: var(--muted); text-align: left; margin-bottom: 6px; }
  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 11px 14px;
    font-size: 15px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .login-input:focus { border-color: rgba(79,142,247,0.4); }
  .login-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 9px;
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-error {
    font-size: 13px;
    color: var(--bad);
    margin-top: 10px;
    display: none;
  }

  /* ADMIN */
  #admin-screen { display: none; }
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; }
  .logo span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .nav-badge { font-size: 11px; background: rgba(79,142,247,0.1); color: var(--accent); border: 1px solid rgba(79,142,247,0.2); padding: 4px 12px; border-radius: 20px; }
  .btn-logout { font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 8px; }
  .btn-logout:hover { color: var(--text); }

  main { max-width: 820px; margin: 0 auto; padding: 2rem; }
  .main-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 0.25rem; }
  .main-sub { font-size: 13px; color: var(--muted); margin-bottom: 2rem; }

  /* CONFIG SECTION */
  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .config-box label { font-size: 13px; color: var(--muted); white-space: nowrap; }
  .config-box input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    flex: 1;
    min-width: 160px;
    outline: none;
  }
  .config-box input:focus { border-color: rgba(79,142,247,0.4); }

  /* PRODUCT CARDS */
  .prod-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.25rem; }
  .prod-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }
  .prod-card.is-featured { border-color: rgba(79,142,247,0.35); }
  .prod-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 8px;
  }
  .prod-card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; }
  .prod-card-actions { display: flex; gap: 8px; }
  .btn-del {
    font-size: 12px;
    padding: 5px 14px;
    background: rgba(255,102,102,0.08);
    color: var(--bad);
    border: 1px solid rgba(255,102,102,0.2);
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-del:hover { background: rgba(255,102,102,0.15); }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media(max-width:500px){ .fields-grid { grid-template-columns: 1fr; } }
  .field-full { grid-column: 1 / -1; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
  }
  .field input, .field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: rgba(79,142,247,0.4); }
  .field select option { background: #1c1c26; }

  .featured-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
  }
  .featured-row input[type=checkbox] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .featured-row label { font-size: 13px; color: var(--muted); cursor: pointer; }

  .btn-add-product {
    width: 100%;
    background: none;
    border: 1px dashed rgba(79,142,247,0.3);
    border-radius: 12px;
    padding: 13px;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-add-product:hover { background: rgba(79,142,247,0.05); }

  /* SAVE BAR */
  .save-bar {
    position: sticky;
    bottom: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .save-status { font-size: 13px; color: var(--muted); }
  .save-status.saved { color: var(--good); }
  .save-actions { display: flex; gap: 10px; }
  .btn-preview {
    font-size: 14px;
    padding: 10px 20px;
    background: none;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 9px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }
  .btn-preview:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn-save {
    font-size: 14px;
    font-weight: 500;
    padding: 10px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }

  /* CHANGE PASSWORD */
  .change-pw {
    margin-top: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
    margin-bottom: 5rem;
  }
  .change-pw-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--muted); }
  .pw-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .pw-row input {
    flex: 1;
    min-width: 140px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .pw-row input:focus { border-color: rgba(79,142,247,0.4); }
  .btn-pw {
    font-size: 13px;
    padding: 9px 18px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-pw:hover { border-color: rgba(255,255,255,0.15); }
  .pw-msg { font-size: 12px; margin-top: 8px; }
  .pw-msg.ok { color: var(--good); }
  .pw-msg.err { color: var(--bad); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">TV<span>Box</span>Pro</div>
    <div class="login-sub">Panel de administración</div>
    <label class="login-label">Usuario</label>
    <input type="text" class="login-input" id="user-input" placeholder="admin" onkeydown="if(event.key==='Enter')document.getElementById('pw-input').focus()">
    <label class="login-label">Contraseña</label>
    <input type="password" class="login-input" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error">Usuario o contraseña incorrectos</div>}
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <nav>
    <div class="logo">TV<span>Box</span>Pro <span style="font-size:12px;font-weight:400;color:var(--muted);margin-left:6px;">admin</span></div>
    <div class="nav-right">
      <span class="nav-badge">Panel privado</span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main>
    <div class="main-title">Gestión de productos</div>
    <div class="main-sub">Los cambios se guardan y se ven en la página al instante.</div>

    <div class="config-box">
      <label>WhatsApp de contacto</label>
      <input type="text" id="wa-cfg" placeholder="+56912345678" oninput="markUnsaved()">
    </div>

    <div class="prod-list" id="prod-list"></div>
    <button class="btn-add-product" onclick="addProduct()">+ Agregar producto</button>

    <div class="change-pw">
      <div class="change-pw-title">Cambiar credenciales de acceso</div>
      <div class="pw-row">
        <input type="text" id="new-user" placeholder="Nuevo usuario">
        <input type="password" id="new-pw" placeholder="Nueva contraseña">
        <input type="password" id="new-pw2" placeholder="Repetir contraseña">
        <button class="btn-pw" onclick="changePassword()">Guardar</button>
      </div>
      <div class="pw-msg" id="pw-msg"></div>
    </div>
  </main>

  <div class="save-bar">
    <span class="save-status" id="save-status">Sin cambios pendientes</span>
    <div class="save-actions">
      <a href="index.html" target="_blank" class="btn-preview">Ver página →</a>
      <button class="btn-save" onclick="saveAll()">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_PASS = 'admin123';
const TAG_OPTS = [
  { key:'amber', label:'Para empezar' },
  { key:'blue',  label:'Más vendido'  },
  { key:'green', label:'Lo mejor'     },
];

let products = [];
let nextId = 10;
let unsaved = false;

function getCredentials() {
  return {
    user: localStorage.getItem('tvbox_username') || 'admin',
    pass: localStorage.getItem('tvbox_password') || DEFAULT_PASS,
  };
}

function doLogin() {
  const user = document.getElementById('user-input').value.trim();
  const pass = document.getElementById('pw-input').value;
  const creds = getCredentials();
  if (user === creds.user && pass === creds.pass) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('user-input').focus();
  }
}

function logout() {
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
}

function loadData() {
  const raw = localStorage.getItem('tvbox_products');
  const cfg = localStorage.getItem('tvbox_config');
  products = raw ? JSON.parse(raw) : getDefaultProducts();
  const waVal = cfg ? JSON.parse(cfg).wa : '+56912345678';
  document.getElementById('wa-cfg').value = waVal;
  nextId = products.reduce((m,p) => Math.max(m, p.id), 0) + 1;
  renderList();
}

function getDefaultProducts() {
  return [
    { id:1, name:'TV Box Básico',  desc:'YouTube, Netflix, series. Optimizado para que todo abra rápido y sin trabas.',          price:'XX.XXX', tag:'amber', featured:false },
    { id:2, name:'TV Box Pro',     desc:'Más fluido, mejor imagen. El favorito de nuestros clientes.',                            price:'XX.XXX', tag:'blue',  featured:true  },
    { id:3, name:'TV Box Ultra',   desc:'La mejor experiencia posible. Para el que no quiere compromisos.',                       price:'XX.XXX', tag:'green', featured:false },
  ];
}

function addProduct() {
  products.push({ id: nextId++, name:'Nuevo modelo', desc:'Descripción del equipo.', price:'XX.XXX', tag:'amber', featured:false });
  renderList();
  markUnsaved();
}

function removeProduct(id) {
  if (products.length <= 1) return alert('Debe haber al menos un producto.');
  products = products.filter(p => p.id !== id);
  renderList();
  markUnsaved();
}

function renderList() {
  const list = document.getElementById('prod-list');
  list.innerHTML = products.map(p => {
    const photos = p.photos || ['','',''];
    return `
    <div class="prod-card ${p.featured ? 'is-featured' : ''}" id="card-${p.id}">
      <div class="prod-card-top">
        <div class="prod-card-name">${p.name}</div>
        <div class="prod-card-actions">
          ${products.length > 1 ? `<button class="btn-del" onclick="removeProduct(${p.id})">Eliminar</button>` : ''}
        </div>
      </div>
      <div class="fields-grid">
        <div class="field">
          <label>Nombre del producto</label>
          <input type="text" value="${p.name}" oninput="updateField(${p.id},'name',this.value)">
        </div>
        <div class="field">
          <label>Precio (ej: 29.990)</label>
          <input type="text" value="${p.price}" oninput="updateField(${p.id},'price',this.value)">
        </div>
        <div class="field field-full">
          <label>Descripción breve</label>
          <input type="text" value="${p.desc}" oninput="updateField(${p.id},'desc',this.value)">
        </div>
        <div class="field">
          <label>Etiqueta</label>
          <select onchange="updateField(${p.id},'tag',this.value)">
            ${TAG_OPTS.map(t => `<option value="${t.key}" ${p.tag===t.key?'selected':''}>${t.label}</option>`).join('')}
          </select>
        </div>
        <div class="field" style="display:flex;align-items:flex-end;">
          <div class="featured-row">
            <input type="checkbox" id="ft-${p.id}" ${p.featured?'checked':''} onchange="updateField(${p.id},'featured',this.checked)">
            <label for="ft-${p.id}">Marcar como destacado</label>
          </div>
        </div>
        <div class="field field-full" style="border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;margin-top:4px;">
          <label style="font-size:12px;color:var(--accent);margin-bottom:8px;display:block;">Fotos (links de Cloudinary)</label>
          ${[0,1,2].map(i => `
            <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
              <input type="text" placeholder="https://res.cloudinary.com/..." value="${photos[i]||''}" oninput="updatePhoto(${p.id},${i},this.value)" style="flex:1;font-size:12px;">
              ${photos[i] ? `<img src="${photos[i]}" style="width:36px;height:36px;object-fit:cover;border-radius:5px;flex-shrink:0;">` : ''}
            </div>
          `).join('')}
        </div>
        <div class="field field-full">
          <label>Video de YouTube (link o ID)</label>
          <input type="text" placeholder="https://youtube.com/watch?v=..." value="${p.video||''}" oninput="updateField(${p.id},'video',this.value)">
        </div>
      </div>
    </div>
  `}).join('');
}

function updatePhoto(id, index, value) {
  const p = products.find(p => p.id === id);
  if (p) {
    if (!p.photos) p.photos = ['','',''];
    p.photos[index] = value;
    markUnsaved();
  }
}

function updateField(id, field, value) {
  const p = products.find(p => p.id === id);
  if (p) {
    p[field] = value;
    const card = document.getElementById(`card-${id}`);
    if (field === 'name') card.querySelector('.prod-card-name').textContent = value;
    if (field === 'featured') card.className = `prod-card ${value ? 'is-featured' : ''}`;
    markUnsaved();
  }
}

function markUnsaved() {
  unsaved = true;
  const s = document.getElementById('save-status');
  s.textContent = 'Tienes cambios sin guardar';
  s.className = 'save-status';
}

function saveAll() {
  localStorage.setItem('tvbox_products', JSON.stringify(products));
  const wa = document.getElementById('wa-cfg').value;
  localStorage.setItem('tvbox_config', JSON.stringify({ wa }));
  unsaved = false;
  const s = document.getElementById('save-status');
  s.textContent = '¡Guardado! Los cambios ya se ven en la página.';
  s.className = 'save-status saved';
  setTimeout(() => {
    s.textContent = 'Sin cambios pendientes';
    s.className = 'save-status';
  }, 3000);
}

function changePassword() {
  const newUser = document.getElementById('new-user').value.trim();
  const p1 = document.getElementById('new-pw').value;
  const p2 = document.getElementById('new-pw2').value;
  const msg = document.getElementById('pw-msg');
  if (!newUser) {
    msg.className = 'pw-msg err'; msg.textContent = 'El usuario no puede estar vacío.'; return;
  }
  if (!p1 || p1.length < 4) {
    msg.className = 'pw-msg err'; msg.textContent = 'La contraseña debe tener al menos 4 caracteres.'; return;
  }
  if (p1 !== p2) {
    msg.className = 'pw-msg err'; msg.textContent = 'Las contraseñas no coinciden.'; return;
  }
  localStorage.setItem('tvbox_username', newUser);
  localStorage.setItem('tvbox_password', p1);
  document.getElementById('new-user').value = '';
  document.getElementById('new-pw').value = '';
  document.getElementById('new-pw2').value = '';
  msg.className = 'pw-msg ok';
  msg.textContent = 'Credenciales actualizadas correctamente.';
  setTimeout(() => { msg.textContent = ''; }, 3000);
}

window.addEventListener('beforeunload', e => {
  if (unsaved) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
</html>
